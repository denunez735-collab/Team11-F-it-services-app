<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - MicroFit Coach</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .auth-container {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-color);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(77, 225, 201, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-secondary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-row .form-group {
            margin-bottom: 0;
        }

        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s, background 0.3s;
        }

        .strength-bar.weak {
            width: 33%;
            background: #ff6b6b;
        }

        .strength-bar.medium {
            width: 66%;
            background: #ffd93d;
        }

        .strength-bar.strong {
            width: 100%;
            background: #4de1c9;
        }

        .terms-check {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 20px 0;
            font-size: 0.85rem;
        }

        .terms-check input[type="checkbox"] {
            margin-top: 3px;
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .terms-check label {
            margin: 0;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .terms-check a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(77, 225, 201, 0.2);
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(77, 225, 201, 0.3);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .btn-register:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #ff6b6b;
            display: none;
            font-size: 0.9rem;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(77, 225, 201, 0.1);
            color: #4de1c9;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #4de1c9;
            display: none;
            font-size: 0.9rem;
        }

        .success-message.show {
            display: block;
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .auth-footer a:hover {
            color: var(--secondary);
        }

        body.light-mode .auth-container {
            background: #ffffff;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 640px) {
            .auth-container {
                padding: 40px 24px;
            }

            .auth-header h1 {
                font-size: 1.5rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .form-row .form-group {
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>🏋️ MicroFit Coach</h1>
            <p>Create your account</p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input 
                        type="text" 
                        id="firstName" 
                        placeholder="John"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input 
                        type="text" 
                        id="lastName" 
                        placeholder="Doe"
                        required
                    >
                </div>
            </div>

            <div class="form-group">
                <label for="registerEmail">Email Address</label>
                <input 
                    type="email" 
                    id="registerEmail" 
                    placeholder="your@email.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="registerPassword">Password</label>
                <input 
                    type="password" 
                    id="registerPassword" 
                    placeholder="••••••••"
                    required
                >
                <div class="password-strength">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input 
                    type="password" 
                    id="confirmPassword" 
                    placeholder="••••••••"
                    required
                >
            </div>

            <div class="terms-check">
                <input type="checkbox" id="termsCheck" required>
                <label for="termsCheck">
                    I agree to the <a href="#" onclick="alert('Terms of Service'); return false;">Terms of Service</a> and <a href="#" onclick="alert('Privacy Policy'); return false;">Privacy Policy</a>
                </label>
            </div>

            <button type="submit" class="btn-register" id="registerBtn">
                Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? 
            <a href="login.html">Sign in</a>
        </div>

        <div class="auth-footer" style="margin-top: 15px; font-size: 0.8rem;">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const firstNameInput = document.getElementById('firstName');
        const lastNameInput = document.getElementById('lastName');
        const registerEmail = document.getElementById('registerEmail');
        const registerPassword = document.getElementById('registerPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const termsCheck = document.getElementById('termsCheck');
        const registerBtn = document.getElementById('registerBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const strengthBar = document.getElementById('strengthBar');

        // Password strength indicator
        registerPassword.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;

            if (password.length >= 8) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[!@#$%^&*]/.test(password)) strength++;

            strengthBar.classList.remove('weak', 'medium', 'strong');

            if (strength === 0) {
                strengthBar.classList.add('weak');
            } else if (strength <= 2) {
                strengthBar.classList.add('weak');
            } else if (strength === 3) {
                strengthBar.classList.add('medium');
            } else {
                strengthBar.classList.add('strong');
            }
        });

        registerForm.addEventListener('submit', function(e) {
            e.preventDefault();

            const firstName = firstNameInput.value.trim();
            const lastName = lastNameInput.value.trim();
            const email = registerEmail.value.trim();
            const password = registerPassword.value;
            const confirmPwd = confirmPassword.value;

            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');

            // Validation
            if (!firstName || !lastName || !email || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (!isValidEmail(email)) {
                showError('Please enter a valid email address');
                return;
            }

            if (password.length < 8) {
                showError('Password must be at least 8 characters long');
                return;
            }

            if (password !== confirmPwd) {
                showError('Passwords do not match');
                return;
            }

            if (!termsCheck.checked) {
                showError('You must agree to the Terms of Service');
                return;
            }

            // Check if user already exists
            const users = JSON.parse(localStorage.getItem('microfit-users') || '[]');
            if (users.some(u => u.email === email)) {
                showError('Email already registered. Please sign in.');
                return;
            }

            // Register user
            const newUser = {
                uid: 'user-' + Date.now(),
                email: email,
                displayName: firstName + ' ' + lastName,
                password: password, // Note: In production, NEVER store passwords in plain text!
                createdAt: new Date().toISOString()
            };

            users.push(newUser);
            localStorage.setItem('microfit-users', JSON.stringify(users));

            // Set as current user
            const currentUser = {
                uid: newUser.uid,
                email: newUser.email,
                displayName: newUser.displayName,
                loginTime: new Date().toISOString()
            };

            localStorage.setItem('microfit-currentUser', JSON.stringify(currentUser));
            localStorage.setItem('microfit-lastLogin', new Date().toISOString());

            showSuccess('Account created successfully! Redirecting...');
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        });

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
        }

        // Toggle theme
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('macrofit-theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
            }
        });
    </script>
</body>
</html>
