<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80" role="img" aria-labelledby="title">
  <title id="title">MicroFit logo</title>
  <defs>
    <linearGradient id="logoGradient" x1="0" x2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#3b6dff"/>
    </linearGradient>
  </defs>
  <rect width="320" height="80" fill="transparent"/>
  <g transform="translate(10,10)">
