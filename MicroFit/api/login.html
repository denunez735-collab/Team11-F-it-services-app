<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MicroFit Coach</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .auth-container {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-color);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(77, 225, 201, 0.1);
        }

        .form-group input::placeholder {
            color: var(--text-secondary);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(77, 225, 201, 0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(77, 225, 201, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background: rgba(255, 107, 107, 0.1);
            color: #ff6b6b;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #ff6b6b;
            display: none;
            font-size: 0.9rem;
        }

        .error-message.show {
            display: block;
        }

        .auth-divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-color);
        }

        .auth-divider span {
            background: var(--card-bg);
            padding: 0 12px;
            color: var(--text-secondary);
            position: relative;
            font-size: 0.85rem;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .social-btn {
            padding: 12px;
            border: 2px solid var(--border-color);
            background: var(--card-bg);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--text-primary);
            font-size: 0.85rem;
            font-weight: 600;
        }

        .social-btn:hover {
            border-color: var(--primary);
            background: rgba(77, 225, 201, 0.05);
            transform: translateY(-2px);
        }

        .social-btn i {
            font-size: 1rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .auth-footer a:hover {
            color: var(--secondary);
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        body.light-mode .auth-container {
            background: #ffffff;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 640px) {
            .auth-container {
                padding: 40px 24px;
            }

            .auth-header h1 {
                font-size: 1.5rem;
            }

            .social-login {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>🏋️ MicroFit Coach</h1>
            <p>Sign in to your account</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="loginEmail">Email Address</label>
                <input 
                    type="email" 
                    id="loginEmail" 
                    placeholder="your@email.com"
                    required
                >
            </div>

            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input 
                    type="password" 
                    id="loginPassword" 
                    placeholder="••••••••"
                    required
                >
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                Sign In
            </button>
        </form>

        <div class="auth-divider">
            <span>or continue with</span>
        </div>

        <div class="social-login">
            <button type="button" class="social-btn" id="googleLoginBtn">
                <i class="fab fa-google"></i>
                <span>Google</span>
            </button>
            <button type="button" class="social-btn" id="githubLoginBtn">
                <i class="fab fa-github"></i>
                <span>GitHub</span>
            </button>
        </div>

        <div class="auth-footer">
            Don't have an account? 
            <a href="register.html">Sign up</a>
        </div>

        <div class="auth-footer" style="margin-top: 15px; font-size: 0.8rem;">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    
    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDemoKeyDoNotUseInProduction",
            authDomain: "microfit-coach.firebaseapp.com",
            projectId: "microfit-coach",
            storageBucket: "microfit-coach.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef123456"
        };

        // Initialize Firebase (replace with your actual config)
        // firebase.initializeApp(firebaseConfig);
        // const auth = firebase.auth();

        // For demo purposes, using localStorage authentication
        const auth = {
            users: JSON.parse(localStorage.getItem('microfit-users') || '[]'),
            currentUser: JSON.parse(localStorage.getItem('microfit-currentUser') || 'null')
        };

        const loginForm = document.getElementById('loginForm');
        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const githubLoginBtn = document.getElementById('githubLoginBtn');

        // Check if user is already logged in
        if (auth.currentUser) {
            window.location.href = 'index.html';
        }

        // Email/Password Login
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const email = loginEmail.value.trim();
            const password = loginPassword.value;

            errorMessage.classList.remove('show');

            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (!isValidEmail(email)) {
                showError('Please enter a valid email address');
                return;
            }

            // Simulate login (in production, use Firebase)
            const user = auth.users.find(u => u.email === email);
            
            if (!user) {
                showError('Email not found. Please register first.');
                return;
            }

            if (user.password !== password) {
                showError('Incorrect password');
                return;
            }

            // Set current user and redirect
            const currentUser = {
                uid: user.uid,
                email: user.email,
                displayName: user.displayName,
                loginTime: new Date().toISOString()
            };

            localStorage.setItem('microfit-currentUser', JSON.stringify(currentUser));
            localStorage.setItem('microfit-lastLogin', new Date().toISOString());
            
            window.location.href = 'index.html';
        });

        // Social Login Handlers
        googleLoginBtn.addEventListener('click', function() {
            simulateSocialLogin('Google', 'google-user-' + Math.random().toString(36).substr(2, 9));
        });

        githubLoginBtn.addEventListener('click', function() {
            simulateSocialLogin('GitHub', 'github-user-' + Math.random().toString(36).substr(2, 9));
        });

        function simulateSocialLogin(provider, uid) {
            const currentUser = {
                uid: uid,
                email: `${uid}@${provider.toLowerCase()}.local`,
                displayName: `${provider} User`,
                provider: provider,
                loginTime: new Date().toISOString()
            };

            localStorage.setItem('microfit-currentUser', JSON.stringify(currentUser));
            localStorage.setItem('microfit-lastLogin', new Date().toISOString());
            
            window.location.href = 'index.html';
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        // Toggle theme
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('macrofit-theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
            }
        });
    </script>
</body>
</html>
