<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | MacroFit Coach</title>
    <meta name="description" content="Create your MacroFit Coach account and start tracking your fitness journey.">
    <link rel="icon" href="assets/logo.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-page">

    <!-- =============================================
         NAVIGATION
         ============================================= -->
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-icon">&#128170;</span>
                <span class="logo-text">MacroFit<span class="accent">Coach</span></span>
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html#macro-tracker">Macros</a></li>
                <li><a href="index.html#health-calculator">Calculator</a></li>
                <li><a href="index.html#meal-planner">Meals</a></li>
                <li><a href="index.html#workout-tracker">Workouts</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="team.html">Team</a></li>
                <li><a href="blog.html">Blog</a></li>
            </ul>
            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
                    <i class="fas fa-sun" id="themeIcon"></i>
                </button>
                <button class="hamburger" id="hamburger" aria-label="Open menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- =============================================
         REGISTER FORM
         ============================================= -->
    <section class="auth-section">
        <div class="auth-card">
            <div class="auth-header">
                <img src="assets/logo.png" alt="MacroFit Coach" style="width:72px; height:72px; border-radius:16px;">
                <h1>Create Account</h1>
                <p>Start your fitness journey with MacroFit Coach</p>
            </div>

            <div class="auth-message error" id="errorMessage"></div>
            <div class="auth-message success" id="successMessage"></div>

            <form id="registerForm">
                <div class="auth-form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="registerEmail">Email Address</label>
                    <input type="email" id="registerEmail" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" placeholder="Minimum 8 characters" required>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-label" id="strengthLabel"></div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
                </div>

                <div class="terms-check">
                    <input type="checkbox" id="termsCheck" required>
                    <label for="termsCheck">
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Sign in</a></p>
                <p style="margin-top:12px; font-size:13px;"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
            </div>
        </div>
    </section>

    <!-- =============================================
         PAGE SCRIPTS
         ============================================= -->
    <script>
        'use strict';

        /* Theme toggle */
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon   = document.getElementById('themeIcon');
        const htmlEl      = document.documentElement;

        function applyTheme(theme) {
            htmlEl.setAttribute('data-theme', theme);
            if (themeIcon) themeIcon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        }

        applyTheme(localStorage.getItem('mfc_theme') || 'dark');

        themeToggle?.addEventListener('click', () => {
            const next = htmlEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('mfc_theme', next);
            applyTheme(next);
        });

        /* Mobile hamburger */
        const hamburger = document.getElementById('hamburger');
        const navLinks  = document.getElementById('navLinks');
        hamburger?.addEventListener('click', () => navLinks.classList.toggle('open'));
        navLinks?.querySelectorAll('a').forEach(a => a.addEventListener('click', () => navLinks.classList.remove('open')));

        /* ============================================================
           REGISTRATION — localStorage demo auth
           In production, replace with Azure Functions API calls:
           POST /api/register → hash password server-side → store in Cosmos DB
           WARNING: Passwords are stored in plain text in localStorage.
           This is for demo/capstone purposes ONLY.
           ============================================================ */
        const registerForm    = document.getElementById('registerForm');
        const firstNameInput  = document.getElementById('firstName');
        const lastNameInput   = document.getElementById('lastName');
        const registerEmail   = document.getElementById('registerEmail');
        const registerPassword = document.getElementById('registerPassword');
        const confirmPassword = document.getElementById('confirmPassword');
        const termsCheck      = document.getElementById('termsCheck');
        const registerBtn     = document.getElementById('registerBtn');
        const errorMessage    = document.getElementById('errorMessage');
        const successMessage  = document.getElementById('successMessage');
        const strengthBar     = document.getElementById('strengthBar');
        const strengthLabel   = document.getElementById('strengthLabel');

        // If already logged in, redirect
        if (localStorage.getItem('mfc_currentUser')) {
            window.location.href = 'index.html';
        }

        /* Password strength indicator */
        registerPassword.addEventListener('input', function() {
            const pw = this.value;
            let strength = 0;
            const checks = {
                length:  pw.length >= 8,
                lower:   /[a-z]/.test(pw),
                upper:   /[A-Z]/.test(pw),
                number:  /\d/.test(pw),
                special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw),
            };

            strength = Object.values(checks).filter(Boolean).length;

            strengthBar.className = 'strength-bar';
            if (pw.length === 0) {
                strengthLabel.textContent = '';
                return;
            } else if (strength <= 2) {
                strengthBar.classList.add('weak');
                strengthLabel.textContent = 'Weak';
                strengthLabel.style.color = '#ef4444';
            } else if (strength <= 3) {
                strengthBar.classList.add('medium');
                strengthLabel.textContent = 'Medium';
                strengthLabel.style.color = '#f59e0b';
            } else {
                strengthBar.classList.add('strong');
                strengthLabel.textContent = 'Strong';
                strengthLabel.style.color = '#6366f1';
            }
        });

        /* Form submission */
        registerForm.addEventListener('submit', function(e) {
            e.preventDefault();
            hideMessage(errorMessage);
            hideMessage(successMessage);

            const firstName = firstNameInput.value.trim();
            const lastName  = lastNameInput.value.trim();
            const email     = registerEmail.value.trim();
            const password  = registerPassword.value;
            const confirmPw = confirmPassword.value;

            // Validation
            if (!firstName || !lastName || !email || !password) {
                showMessage(errorMessage, 'Please fill in all fields.');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showMessage(errorMessage, 'Please enter a valid email address.');
                return;
            }

            if (password.length < 8) {
                showMessage(errorMessage, 'Password must be at least 8 characters.');
                return;
            }

            if (password !== confirmPw) {
                showMessage(errorMessage, 'Passwords do not match.');
                return;
            }

            if (!termsCheck.checked) {
                showMessage(errorMessage, 'Please agree to the Terms of Service.');
                return;
            }

            // Check for existing user
            const users = JSON.parse(localStorage.getItem('mfc_users') || '[]');
            if (users.some(u => u.email === email)) {
                showMessage(errorMessage, 'This email is already registered. <a href="login.html" style="color:var(--accent-green);font-weight:700;">Sign in instead</a>');
                return;
            }

            // Create user
            const newUser = {
                uid: 'user-' + Date.now(),
                email: email,
                displayName: firstName + ' ' + lastName,
                password: password, // DEMO ONLY — in production, hash with bcrypt on server
                createdAt: new Date().toISOString()
            };

            users.push(newUser);
            localStorage.setItem('mfc_users', JSON.stringify(users));

            // Auto-login
            const session = {
                uid: newUser.uid,
                email: newUser.email,
                displayName: newUser.displayName,
                loginTime: new Date().toISOString()
            };
            localStorage.setItem('mfc_currentUser', JSON.stringify(session));

            showMessage(successMessage, 'Account created! Redirecting to dashboard...');
            registerBtn.disabled = true;

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 2000);
        });

        /* Helpers */
        function showMessage(el, html) {
            el.innerHTML = html;
            el.classList.add('show');
        }
        function hideMessage(el) {
            el.classList.remove('show');
        }
    </script>
</body>
</html>
